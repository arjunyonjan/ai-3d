<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS Pro Memory Pyramid</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #0a0e17; font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; }
        #search-wrapper {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            z-index: 20; display: flex; justify-content: center; gap: 8px;
        }
        #search-input {
            background: rgba(10, 18, 30, 0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 229, 255, 0.15);
            border-radius: 8px; padding: 12px 28px; width: 320px;
            color: #a0c4d4; font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; font-size: 0.75rem;
            outline: none; text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
            transition: 0.3s ease; letter-spacing: 0.5px;
        }
        #search-input:focus {
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.05), inset 0 0 20px rgba(0, 229, 255, 0.02);
        }
        #search-input::placeholder { color: rgba(160, 196, 212, 0.3); }
        #stt-btn {
            background: rgba(10, 18, 30, 0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 229, 255, 0.15); border-radius: 8px;
            width: 42px; height: 42px; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s ease; color: rgba(160, 196, 212, 0.5);
            flex-shrink: 0;
        }
        #stt-btn:hover { border-color: rgba(0, 229, 255, 0.4); color: #a0c4d4; }
        #stt-btn.listening {
            color: #ff0044; border-color: #ff0044;
            box-shadow: 0 0 20px rgba(255, 0, 68, 0.3);
            animation: stt-pulse 1s ease-in-out infinite;
        }
        .voice-level {
            display: none; gap: 2px; align-items: center;
            height: 20px; margin-top: auto; margin-bottom: auto;
        }
        .voice-level.active { display: flex; }
        .voice-bar {
            width: 2px; height: 100%; border-radius: 1px;
            background: #00ffa0;
            box-shadow: 0 0 6px #00ffa0, 0 0 12px rgba(0, 255, 160, 0.3);
            transform-origin: bottom;
            transition: transform 0.06s ease;
        }
        .voice-bar:nth-child(1) { --vb-m: 0.6; }
        .voice-bar:nth-child(2) { --vb-m: 1.0; }
        .voice-bar:nth-child(3) { --vb-m: 1.0; }
        .voice-bar:nth-child(4) { --vb-m: 0.6; }
        @keyframes stt-pulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 68, 0.2); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 68, 0.5); }
        }
        /* STT Button — SVG mic */
        #stt-btn svg {
            width: 18px; height: 18px;
            fill: currentColor;
            transition: 0.3s ease;
        }
        /* STT Hologram — ChatGPT-style orbiting dots */
        #stt-hologram {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none;
            display: none; width: 0; height: 0;
        }
        #stt-hologram.active { display: block; }
        .stt-ring {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(0, 229, 255, 0.2);
            top: 50%; left: 50%;
            animation: ring-expand 2.5s ease-out infinite;
            width: 0; height: 0;
        }
        .stt-ring:nth-child(1) { animation-delay: 0s; }
        .stt-ring:nth-child(2) { animation-delay: 0.8s; }
        .stt-ring:nth-child(3) { animation-delay: 1.6s; }
        @keyframes ring-expand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(10); opacity: 0; }
        }
        .stt-orbit {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
        }
        .stt-orbit-dot {
            position: absolute; top: 50%; left: 50%;
            width: 7px; height: 7px; margin: -3.5px 0 0 -3.5px;
            border-radius: 50%;
            animation: dot-orbit 2s linear infinite;
            box-shadow: 0 0 14px var(--oc), 0 0 28px var(--oc);
        }
        .stt-orbit-dot:nth-child(1) { --oc: #00e5ff; animation-delay: 0s; }
        .stt-orbit-dot:nth-child(2) { --oc: #00ffa0; animation-delay: 0.5s; }
        .stt-orbit-dot:nth-child(3) { --oc: #ffaa33; animation-delay: 1.0s; }
        .stt-orbit-dot:nth-child(4) { --oc: #ff66aa; animation-delay: 1.5s; }
        @keyframes dot-orbit {
            0%   { transform: rotate(0deg)   translateY(-40px); opacity: 0.3; }
            25%  { transform: rotate(90deg)  translateY(-40px); opacity: 1; }
            50%  { transform: rotate(180deg) translateY(-40px); opacity: 0.3; }
            75%  { transform: rotate(270deg) translateY(-40px); opacity: 1; }
            100% { transform: rotate(360deg) translateY(-40px); opacity: 0.3; }
        }
        .stt-waveform {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; gap: 3px; align-items: center;
            height: 30px;
        }
        .stt-wave-bar {
            width: 3px; height: 100%; border-radius: 2px;
            background: rgba(0, 229, 255, 0.6);
            box-shadow: 0 0 6px rgba(0, 229, 255, 0.3);
            transform-origin: bottom;
            transition: transform 0.05s ease;
        }
        .stt-wave-bar:nth-child(1) { --bar-mult: 0.5; }
        .stt-wave-bar:nth-child(2) { --bar-mult: 0.8; }
        .stt-wave-bar:nth-child(3) { --bar-mult: 1.0; }
        .stt-wave-bar:nth-child(4) { --bar-mult: 0.8; }
        .stt-wave-bar:nth-child(5) { --bar-mult: 0.5; }
        .stt-label {
            position: absolute; left: 50%; bottom: -50px; transform: translateX(-50%);
            color: rgba(0, 229, 255, 0.5); font-size: 0.5rem;
            letter-spacing: 3px; text-transform: uppercase;
            white-space: nowrap;
            animation: label-fade 1.8s ease-in-out infinite;
        }
        @keyframes label-fade {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
        /* STT Speech Preview */
        #stt-preview {
            position: fixed; top: 130px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none;
            background: rgba(10, 18, 30, 0.75); backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.12);
            border-radius: 6px; padding: 5px 14px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
            color: rgba(0, 229, 255, 0.7); letter-spacing: 0.5px;
            white-space: nowrap; max-width: 320px; overflow: hidden; text-overflow: ellipsis;
            opacity: 0; transform: translateX(-50%) translateY(-4px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        #stt-preview.active {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }
        .folder-label, .folder-label * { pointer-events: none !important; }
        .feature-label, .feature-label * { pointer-events: none !important; }
        .folder-label {
            font-size: 0.6rem; background: transparent; padding: 2px 10px;
            pointer-events: none; color: #00e5ff;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.25), 0 0 40px rgba(0, 229, 255, 0.08);
            font-weight: 500; letter-spacing: 1.2px;
            border: 1px solid rgba(0, 229, 255, 0.08); border-radius: 3px;
            backdrop-filter: blur(4px); background: rgba(0, 229, 255, 0.03);
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }
        .folder-label svg { vertical-align: middle; }
        .folder-label.recent-high { color: #00ffff; border-color: rgba(0, 255, 255, 0.5); text-shadow: 0 0 35px rgba(0, 255, 255, 0.6), 0 0 70px rgba(0, 255, 255, 0.25); background: rgba(0, 255, 255, 0.07); border-width: 1.5px; }
        .folder-label .tech-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
        .tech-rust .tech-dot { background: #ce422b; box-shadow: 0 0 6px #ce422b; }
        .tech-nextjs .tech-dot { background: #111; box-shadow: 0 0 6px #111; border: 1px solid #555; }
        .tech-vite .tech-dot { background: #646cff; box-shadow: 0 0 6px #646cff; }
        .tech-react .tech-dot { background: #61dafb; box-shadow: 0 0 6px #61dafb; }
        .tech-python .tech-dot { background: #3776ab; box-shadow: 0 0 6px #3776ab; }
        .tech-html .tech-dot { background: #e44d26; box-shadow: 0 0 6px #e44d26; }
        .tech-node .tech-dot { background: #83cd29; box-shadow: 0 0 6px #83cd29; }
        .tech-three .tech-dot { background: #049ef4; box-shadow: 0 0 6px #049ef4; }
        .tech-playwright .tech-dot { background: #45ba4b; box-shadow: 0 0 6px #45ba4b; }
        .tech-electron .tech-dot { background: #47848f; box-shadow: 0 0 6px #47848f; }
        .tech-unknown .tech-dot { background: #556; box-shadow: 0 0 6px #556; }
        #brand-left { position: fixed; top: 20px; left: 24px; z-index: 30; pointer-events: none; }
        #brand-left .name { font-size: 0.75rem; letter-spacing: 3px; color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.3); font-weight: 500; }
        #brand-left .tag { font-size: 0.5rem; letter-spacing: 2px; color: rgba(160,196,212,0.3); margin-top: 2px; }
        #brand-right { position: fixed; top: 20px; right: 24px; z-index: 30; text-align: right; pointer-events: none; }
        #brand-right .name { font-size: 0.75rem; letter-spacing: 3px; color: #ffaa33; text-shadow: 0 0 20px rgba(255,170,51,0.3); font-weight: 500; }
        #brand-right .tag { font-size: 0.5rem; letter-spacing: 2px; color: rgba(160,196,212,0.3); margin-top: 2px; }
        .feature-label {
            font-size: 0.5rem; background: transparent; padding: 1px 6px;
            pointer-events: none; white-space: nowrap;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-weight: 400; letter-spacing: 0.3px;
            text-shadow: 0 0 15px currentColor, 0 0 30px currentColor;
            border-radius: 2px; border-bottom: 1px solid currentColor;
        }
        .feature-label .feat-icon { font-size: 0.65rem; margin-right: 2px; }
        .feature-label.success { color: #00e5ff; border-color: rgba(0, 229, 255, 0.3); }
        .feature-label.fail { color: #ff0022; border-color: rgba(255, 0, 34, 0.3); }
        #legend {
            position: absolute; bottom: 40px; left: 40px;
            font-size: 0.7rem; opacity: 0.7;
            display: flex; gap: 25px; pointer-events: none;
            color: rgba(160, 196, 212, 0.5);
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace; letter-spacing: 1px; text-transform: uppercase;
        }
        #legend span { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 8px; }
        #legend .y { background: #00e5ff; box-shadow: 0 0 20px #00e5ff33; }
        #legend .g { background: #00e5ff; box-shadow: 0 0 20px #00e5ff33; }
        #legend .r { background: #ff0022; box-shadow: 0 0 20px #ff002233; }

        #tech-filter {
            position: absolute; top: 140px; left: 50%; transform: translateX(-50%);
            z-index: 22; display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
            max-width: 600px;
        }
        .tf-btn {
            padding: 3px 10px; font-size: 0.5rem; letter-spacing: 1px;
            color: rgba(160, 196, 212, 0.35); cursor: pointer; border-radius: 3px;
            transition: 0.2s; font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
            border: 1px solid rgba(0, 229, 255, 0.06);
            background: rgba(10, 18, 30, 0.4);
        }
        .tf-btn:hover { color: rgba(160, 196, 212, 0.7); border-color: rgba(0, 229, 255, 0.15); }
        .tf-btn.active { color: #00e5ff; border-color: rgba(0, 229, 255, 0.3); background: rgba(0, 229, 255, 0.06); }
        .tf-btn .tf-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

        #view-toggle {
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            z-index: 25; display: flex; gap: 2px;
            background: rgba(10, 18, 30, 0.6); backdrop-filter: blur(12px);
            padding: 3px; border-radius: 6px; border: 1px solid rgba(0, 229, 255, 0.08);
        }
        .vt-btn {
            padding: 4px 16px; font-size: 0.6rem; letter-spacing: 1.5px;
            color: rgba(160, 196, 212, 0.4); cursor: pointer; border-radius: 4px;
            transition: 0.2s; font-family: 'Inter', sans-serif; text-transform: uppercase;
        }
        .vt-btn:hover { color: rgba(160, 196, 212, 0.7); background: rgba(0, 229, 255, 0.04); }
        .vt-btn.active { color: #00e5ff; background: rgba(0, 229, 255, 0.08); text-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        #back-view {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%); z-index: 30;
            font-size: 2rem; color: rgba(0, 255, 160, 0.5); cursor: pointer;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            transition: 0.2s; padding: 10px 24px; letter-spacing: 4px;
            border-radius: 6px; background: rgba(10, 18, 30, 0.5);
        }
        #back-view:hover { color: #00ffa0; background: rgba(0, 255, 160, 0.1); }

        /* Dev Panel */
        #dev-btn {
            position: fixed; bottom: 16px; right: 16px; z-index: 100;
            background: rgba(0,255,160,0.1); border: 1px solid rgba(0,255,160,0.3);
            color: #00ffa0; font-family: monospace; font-size: 0.55rem;
            padding: 4px 10px; border-radius: 4px; cursor: pointer;
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        #dev-btn:hover { background: rgba(0,255,160,0.2); }
        #dev-panel {
            position: fixed; bottom: 44px; right: 16px; z-index: 100;
            background: rgba(10,20,16,0.92); border: 1px solid rgba(0,255,160,0.2);
            border-radius: 6px; padding: 12px 16px; min-width: 180px;
            display: none; font-family: monospace; font-size: 0.6rem;
        }
        #dev-panel.open { display: block; }
        #dev-panel label { display: flex; align-items: center; gap: 8px; color: #c0dcd0; cursor: pointer; padding: 3px 0; }
        #dev-panel input[type="checkbox"] { accent-color: #00ffa0; }
        #dev-panel .dev-title { color: rgba(0,255,160,0.5); font-size: 0.5rem; letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; }
        #dev-fps-display { position: fixed; top: 16px; right: 16px; z-index: 100; color: rgba(0,255,160,0.4); font-family: monospace; font-size: 0.55rem; display: none; }
        .hide-3d canvas,
        .hide-3d .label-renderer { display: none !important; }

        /* Detail Panel */
        #detail-panel {
            position: fixed; top: 0; right: -420px; width: 380px; height: 100vh;
            z-index: 50; background: rgba(10, 18, 30, 0.92);
            backdrop-filter: blur(20px); border-left: 1px solid rgba(0, 229, 255, 0.1);
            padding: 24px; box-sizing: border-box;
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            overflow-y: auto;
        }
        #detail-panel.open { right: 0; }
        #detail-panel::-webkit-scrollbar { width: 3px; }
        #detail-panel::-webkit-scrollbar-track { background: transparent; }
        #detail-panel::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.2); border-radius: 2px; }
        .dp-close {
            position: absolute; top: 16px; right: 20px;
            color: rgba(160, 196, 212, 0.4); cursor: pointer; font-size: 1.2rem;
            transition: 0.2s; border: none; background: none;
            font-family: 'JetBrains Mono', monospace;
        }
        .dp-close:hover { color: #00e5ff; }
        .dp-title { font-size: 0.85rem; color: #00e5ff; letter-spacing: 2px; margin-bottom: 4px; font-weight: 500; }
        .dp-subtitle { font-size: 0.6rem; color: rgba(160, 196, 212, 0.4); letter-spacing: 1px; margin-bottom: 20px; }
        .dp-section { margin-bottom: 16px; }
        .dp-label { font-size: 0.5rem; color: rgba(160, 196, 212, 0.3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
        .dp-value { font-size: 0.7rem; color: #a0c4d4; letter-spacing: 0.5px; }
        .dp-tech { display: inline-flex; align-items: center; gap: 6px; }
        .dp-tech-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dp-status { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 3px; font-size: 0.6rem; letter-spacing: 1px; }
        .dp-status.success { color: #00e5ff; background: rgba(0, 229, 255, 0.08); border: 1px solid rgba(0, 229, 255, 0.15); }
        .dp-status.fail { color: #ff0022; background: rgba(255, 0, 34, 0.08); border: 1px solid rgba(255, 0, 34, 0.15); }
        .dp-features { list-style: none; padding: 0; margin: 0; }
        .dp-features li {
            padding: 6px 8px; margin-bottom: 4px; border-radius: 3px;
            font-size: 0.6rem; letter-spacing: 0.3px;
            border-left: 2px solid rgba(160, 196, 212, 0.15);
        }
        .dp-features li.success { border-left-color: #00e5ff; color: #a0d4e0; background: rgba(0, 229, 255, 0.03); }
        .dp-features li.fail { border-left-color: #ff0022; color: #ff8899; background: rgba(255, 0, 34, 0.03); }
        .dp-features .fi { margin-right: 4px; }
        .dp-row { display: flex; gap: 24px; }
        .dp-row .dp-section { flex: 1; }

        /* Vox Orby — Heavenly circular ring animation */
        #speaking-indicator {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; pointer-events: none;
            display: none; width: 0; height: 0;
        }
        #speaking-indicator.active { display: block; }

        .sp-glow {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, rgba(120,80,255,0.03) 40%, transparent 70%);
            filter: blur(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .sp-ring-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .sp-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid transparent;
        }

        .sp-ring-outer {
            width: 180px; height: 180px;
            border-color: rgba(120, 80, 255, 0.2);
            box-shadow: 0 0 30px rgba(120, 80, 255, 0.05), inset 0 0 30px rgba(120, 80, 255, 0.02);
            animation: sp-rotate-cw 8s linear infinite;
        }
        .sp-ring-mid {
            width: 120px; height: 120px;
            border-color: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.05), inset 0 0 25px rgba(0, 229, 255, 0.02);
            animation: sp-rotate-ccw 5s linear infinite;
        }
        .sp-ring-inner {
            width: 70px; height: 70px;
            border-color: rgba(0, 255, 160, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 160, 0.03);
            animation: sp-rotate-cw 3s linear infinite;
        }

        .sp-dot {
            position: absolute;
            border-radius: 50%;
            transition: opacity 0.08s ease, box-shadow 0.08s ease;
        }
        .sp-dot-outer {
            width: 5px; height: 5px;
            background: #9060ff;
            box-shadow: 0 0 10px #9060ff, 0 0 20px rgba(144, 96, 255, 0.3);
        }
        .sp-dot-mid {
            width: 4px; height: 4px;
            background: #00e5ff;
            box-shadow: 0 0 8px #00e5ff, 0 0 16px rgba(0, 229, 255, 0.3);
        }
        .sp-dot-inner {
            width: 3px; height: 3px;
            background: #00ffa0;
            box-shadow: 0 0 6px #00ffa0, 0 0 12px rgba(0, 255, 160, 0.3);
        }

        /* Dots positioned via CSS rotation on ring */
        .sp-ring-outer .sp-dot { top: -2.5px; left: 50%; margin-left: -2.5px; }
        .sp-ring-mid .sp-dot { top: -2px; left: 50%; margin-left: -2px; }
        .sp-ring-inner .sp-dot { top: -1.5px; left: 50%; margin-left: -1.5px; }

        /* Orbiting dot animations (each at different start angle via nth-child) */
        .sp-ring-outer .sp-dot:nth-child(1) { transform: rotate(0deg) translateY(-90px); }
        .sp-ring-outer .sp-dot:nth-child(2) { transform: rotate(90deg) translateY(-90px); }
        .sp-ring-outer .sp-dot:nth-child(3) { transform: rotate(180deg) translateY(-90px); }
        .sp-ring-outer .sp-dot:nth-child(4) { transform: rotate(270deg) translateY(-90px); }

        .sp-ring-mid .sp-dot:nth-child(1) { transform: rotate(0deg) translateY(-60px); }
        .sp-ring-mid .sp-dot:nth-child(2) { transform: rotate(60deg) translateY(-60px); }
        .sp-ring-mid .sp-dot:nth-child(3) { transform: rotate(120deg) translateY(-60px); }
        .sp-ring-mid .sp-dot:nth-child(4) { transform: rotate(180deg) translateY(-60px); }
        .sp-ring-mid .sp-dot:nth-child(5) { transform: rotate(240deg) translateY(-60px); }
        .sp-ring-mid .sp-dot:nth-child(6) { transform: rotate(300deg) translateY(-60px); }

        .sp-ring-inner .sp-dot:nth-child(1) { transform: rotate(0deg) translateY(-35px); }
        .sp-ring-inner .sp-dot:nth-child(2) { transform: rotate(120deg) translateY(-35px); }
        .sp-ring-inner .sp-dot:nth-child(3) { transform: rotate(240deg) translateY(-35px); }

        @keyframes sp-rotate-cw {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes sp-rotate-ccw {
            from { transform: translate(-50%, -50%) rotate(360deg); }
            to { transform: translate(-50%, -50%) rotate(0deg); }
        }

        /* Central orb — pulses with voice level */
        .sp-orb {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #00ffa0, #00e5ff 40%, #6060ff 100%);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4), 0 0 60px rgba(0, 229, 255, 0.15);
            transition: width 0.08s ease, height 0.08s ease, box-shadow 0.08s ease;
        }

        .sp-label {
            position: absolute; left: 50%; bottom: -55px; transform: translateX(-50%);
            color: rgba(0, 229, 255, 0.35); font-size: 0.5rem;
            letter-spacing: 4px; text-transform: uppercase;
            white-space: nowrap;
            animation: sp-fade 2s ease-in-out infinite;
        }
        @keyframes sp-fade {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
